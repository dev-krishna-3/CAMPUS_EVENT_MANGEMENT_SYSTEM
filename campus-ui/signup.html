<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="theme-color" content="#6555ff"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <title>Signup | EVENTORA</title>
  <link rel="manifest" href="/manifest.json">
  <link rel="icon" href="/icon-192.png">
  <link rel="apple-touch-icon" href="/icon-192.png">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="/src/styles.css">
</head>
<body>
  <div class="auth-wrapper">
    <div class="card auth-box">
      <div class="brand" style="text-align: center; margin-bottom: 2rem;">
        <img src="/logo.png" alt="Logo" style="height: 36px; width: auto; margin-right: 8px; vertical-align: middle; border-radius: 4px;"> EVENTORA
      </div>
      <h2 style="text-align: center; margin-bottom: 0.5rem;">Join the Community</h2>
      <p style="text-align: center; color: var(--text-muted); margin-bottom: 2rem;">Create your account today</p>
      
      <form id="signupForm">
        <input type="text" id="name" placeholder="Full Name" required>
        <input type="email" id="email" placeholder="Email Address" required>
        <input type="password" id="password" placeholder="Password" required>
        <select id="role" required>
            <option value="student">I am a Student</option>
            <option value="admin">I am an Admin</option>
        </select>
        <button type="submit" class="btn" style="width: 100%; margin-top: 1rem;">
          Create Account <i class="fas fa-user-plus"></i>
        </button>
      </form>
      
      <p style="text-align: center; margin-top: 1.5rem; font-size: 0.9rem;">
        <span style="color: var(--text-muted);">Already have an account?</span> 
        <a href="/login.html" style="color: var(--primary); text-decoration: none; font-weight: 600;">Sign in</a>
      </p>
    </div>
  </div>
  
  <script type="module">
    import { signup, toast } from '/src/api.js';
    
    document.getElementById('signupForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = e.target.querySelector('button');
      btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Loading...';
      btn.disabled = true;
      
      const data = {
          name: document.getElementById('name').value,
          email: document.getElementById('email').value,
          password: document.getElementById('password').value,
          confirmPassword: document.getElementById('password').value, // match backend requirement
          role: document.getElementById('role').value
      };
      
      const res = await signup(data);
      if (res && res.success) {
        toast('Account created! Redirecting...', 'success');
        setTimeout(() => location.href = '/login.html', 1500);
      } else {
        btn.innerHTML = 'Create Account <i class="fas fa-user-plus"></i>';
        btn.disabled = false;
      }
    });
  </script>
</body>
</html>
