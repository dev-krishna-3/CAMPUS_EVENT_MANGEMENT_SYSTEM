<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="theme-color" content="#6555ff"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <title>Login | EVENTORA</title>
  <link rel="manifest" href="/manifest.json">
  <link rel="icon" href="/icon-192.png">
  <link rel="apple-touch-icon" href="/icon-192.png">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="/src/styles.css">
</head>
<body>
  <div class="auth-wrapper">
    <div class="card auth-box">
      <div class="brand" style="text-align: center; margin-bottom: 2rem;">
        <img src="/logo.png" alt="Logo" style="height: 36px; width: auto; margin-right: 8px; vertical-align: middle; border-radius: 4px;"> EVENTORA
      </div>
      <h2 style="text-align: center; margin-bottom: 0.5rem;">Welcome Back</h2>
      <p style="text-align: center; color: var(--text-muted); margin-bottom: 2rem;">Sign in to your campus portal</p>
      
      <form id="loginForm">
        <input type="email" id="email" placeholder="Email Address" required>
        <input type="password" id="password" placeholder="Password" required>
        <button type="submit" class="btn" style="width: 100%; margin-top: 1rem;">
          Sign In <i class="fas fa-arrow-right"></i>
        </button>
      </form>
      
      <p style="text-align: center; margin-top: 1.5rem; font-size: 0.9rem;">
        <span style="color: var(--text-muted);">Don't have an account?</span> 
        <a href="/signup.html" style="color: var(--primary); text-decoration: none; font-weight: 600;">Create one</a>
      </p>
    </div>
  </div>
  
  <script type="module">
    import { login, redirectByRole } from '/src/api.js';
    
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = e.target.querySelector('button');
      btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Loading...';
      btn.disabled = true;
      
      const email = document.getElementById('email').value;
      const pwd = document.getElementById('password').value;
      
      const user = await login(email, pwd);
      if (user) redirectByRole(user.role);
      else {
        btn.innerHTML = 'Sign In <i class="fas fa-arrow-right"></i>';
        btn.disabled = false;
      }
    });
  </script>
  <script>
    // Register PWA Service Worker
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js').catch(() => {});
    }
  </script>
</body>
</html>
